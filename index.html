<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TT Audit — Rutas de Campaña · Actualización Activos Comerciales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bat-black:   #F4F6FA;
  --bat-dark:    #FFFFFF;
  --bat-panel:   #F8F9FC;
  --bat-card:    #FFFFFF;
  --bat-border:  #DDE2EE;
  --bat-gold:    #1A4BAD;
  --bat-gold2:   #2E63D4;
  --bat-red:     #D94040;
  --bat-blue:    #1A4BAD;
  --bat-green:   #1E8A5E;
  --bat-text:    #1A2035;
  --bat-muted:   #6B7592;
  --bat-subtle:  #C8D0E4;
  --merch-a:     #1A4BAD;
  --merch-b:     #1E8A5E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bat-black); color: var(--bat-text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* ── HEADER ── */
.header { background: var(--bat-dark); border-bottom: 2px solid var(--bat-blue); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 1000; }
.header-left { display: flex; align-items: center; gap: 16px; }
.bat-logo { display: flex; align-items: center; gap: 10px; }
.bat-logo-mark { width: 32px; height: 32px; background: var(--bat-blue); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; }
.bat-logo-mark span { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: #fff; letter-spacing: -0.5px; }
.bat-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: 1px; color: var(--bat-blue); text-transform: uppercase; }
.header-divider { width: 1px; height: 28px; background: var(--bat-border); }
.header-sub { font-size: 12px; color: #6B7592; font-weight: 400; letter-spacing: 0.3px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.badge-total { background: var(--bat-card); border: 1px solid var(--bat-border); border-radius: 4px; padding: 4px 10px; font-size: 11px; color: var(--bat-muted); }
.badge-total strong { color: var(--bat-blue); font-weight: 600; }

/* ── CONTROLS ── */
.controls { background: var(--bat-panel); border-bottom: 1px solid var(--bat-border); padding: 10px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.ctrl-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; color: var(--bat-muted); text-transform: uppercase; letter-spacing: 1px; }
.day-pills { display: flex; gap: 4px; }
.day-pill { padding: 4px 14px; border-radius: 3px; border: 1px solid #DDE2EE; font-size: 12px; font-weight: 500; cursor: pointer; background: #FFFFFF; color: #6B7592; transition: all .15s; font-family: 'Barlow', sans-serif; }
.day-pill:hover { border-color: var(--bat-blue); color: var(--bat-blue); }
.day-pill.active { background: var(--bat-blue); border-color: var(--bat-blue); color: #fff; font-weight: 700; }
.ctrl-sep { width: 1px; height: 22px; background: var(--bat-border); }
.merch-toggle { display: flex; border: 1px solid var(--bat-border); border-radius: 3px; overflow: hidden; }
.merch-btn { padding: 4px 18px; font-size: 12px; font-weight: 600; cursor: pointer; background: #F8F9FC; color: #6B7592; border: none; font-family: 'Barlow', sans-serif; letter-spacing: 0.3px; transition: all .15s; }
.merch-btn.active-a { background: var(--merch-a); color: #fff; }
.merch-btn.active-b { background: var(--merch-b); color: #fff; }
.gmaps-btn { margin-left: auto; display: flex; align-items: center; gap: 6px; padding: 5px 14px; background: transparent; border: 1px solid var(--bat-blue); border-radius: 3px; color: var(--bat-blue); font-size: 11px; font-weight: 600; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; transition: all .15s; }
.gmaps-btn:hover { background: var(--bat-blue); color: #fff; }
.gmaps-icon { width: 14px; height: 14px; }

/* ── STATS BAR ── */
.stats-bar { background: var(--bat-dark); border-bottom: 1px solid var(--bat-border); padding: 8px 24px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
.stat-item { display: flex; align-items: baseline; gap: 6px; }
.stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--bat-blue); line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--bat-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-sep { width: 1px; height: 20px; background: var(--bat-border); }
.project-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.ptag { display: flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 2px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
.ptag.disp { background: rgba(26,75,173,.10); color: #1A4BAD; border: 1px solid rgba(26,75,173,.25); }
.ptag.reel { background: rgba(180,130,20,.10); color: #8B6A10; border: 1px solid rgba(180,130,20,.25); }
.ptag.facing { background: rgba(30,138,94,.10); color: #1E8A5E; border: 1px solid rgba(30,138,94,.25); }

/* ── MAIN LAYOUT ── */
.main { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 58px - 44px - 46px); }
@media (max-width: 800px) { .main { grid-template-columns: 1fr; height: auto; } }

/* ── SIDEBAR ── */
.sidebar { background: var(--bat-panel); border-right: 1px solid var(--bat-border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-head { padding: 10px 14px 8px; border-bottom: 1px solid var(--bat-border); }
.sidebar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--bat-muted); text-transform: uppercase; letter-spacing: 0.8px; }
.route-list { flex: 1; overflow-y: auto; padding: 6px; }
.route-list::-webkit-scrollbar { width: 3px; }
.route-list::-webkit-scrollbar-track { background: transparent; }
.route-list::-webkit-scrollbar-thumb { background: var(--bat-subtle); border-radius: 2px; }

.stop-card { display: flex; gap: 10px; padding: 9px 10px; border-radius: 4px; margin-bottom: 3px; border: 1px solid transparent; cursor: pointer; transition: all .12s; position: relative; }
.stop-card:hover { background: var(--bat-card); border-color: var(--bat-border); }
.stop-card.selected { background: #EEF3FC; border-color: var(--bat-blue); }
.stop-card.selected::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--bat-blue); border-radius: 4px 0 0 4px; }

.stop-num-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0; }
.stop-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
.stop-connector { width: 1px; height: 20px; background: var(--bat-border); margin: 2px 0; }
.stop-body { flex: 1; min-width: 0; }
.stop-name { font-size: 12px; font-weight: 600; color: var(--bat-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.stop-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
.stop-district { font-size: 10px; color: var(--bat-muted); }
.stop-time { font-size: 10px; font-weight: 600; font-family: 'Barlow Condensed', sans-serif; color: var(--bat-blue); background: rgba(26,75,173,.10); padding: 1px 5px; border-radius: 2px; }
.stop-dur { font-size: 10px; color: var(--bat-muted); }
.stop-ot { font-size: 10px; color: #6B7592; line-height: 1.3; margin-bottom: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.stop-cig { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: #5FD4A0; background: rgba(46,158,107,.15); border: 1px solid rgba(46,158,107,.25); padding: 1px 6px; border-radius: 2px; margin-top: 2px; }
.nav-link { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: #1A4BAD; margin-top: 3px; text-decoration: none; cursor: pointer; }
.nav-link:hover { color: #2E63D4; }

/* ── MAP ── */
#map { flex: 1; height: 100%; min-height: 420px; }
.leaflet-container { background: #F0F4F8; }

/* Custom marker */
.bat-marker { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'Barlow', sans-serif; color: white; border: 2px solid rgba(255,255,255,.5); box-shadow: 0 2px 8px rgba(0,0,0,.6); transition: all .15s; }
.bat-marker.selected { border-color: #C8A84B !important; box-shadow: 0 0 0 3px rgba(200,168,75,.4), 0 2px 10px rgba(0,0,0,.8) !important; transform: scale(1.2); }

/* ── POPUP ── */
.leaflet-popup-content-wrapper { background: #FFFFFF; border: 1px solid #DDE2EE; border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
.leaflet-popup-content { margin: 0; }
.leaflet-popup-tip { background: #FFFFFF; }
.leaflet-popup-close-button { color: #6B7592 !important; top: 6px !important; right: 8px !important; font-size: 16px !important; }
.popup-inner { padding: 12px 14px; min-width: 240px; }
.popup-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.popup-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 1px; }
.popup-title-wrap {}
.popup-title { font-size: 13px; font-weight: 600; color: #1A2035; line-height: 1.3; margin-bottom: 2px; }
.popup-cadena { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
.popup-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px; margin-bottom: 8px; }
.popup-key { font-size: 10px; color: #6B7592; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 500; white-space: nowrap; padding-top: 1px; }
.popup-val { font-size: 11px; color: #1A2035; line-height: 1.4; }
.popup-cig { display: flex; align-items: center; gap: 5px; padding: 6px 8px; background: rgba(30,138,94,.08); border: 1px solid rgba(30,138,94,.2); border-radius: 3px; margin-bottom: 8px; }
.popup-cig-icon { font-size: 12px; }
.popup-cig-text { font-size: 11px; color: #1E8A5E; font-weight: 500; }
.popup-actions { display: flex; gap: 6px; }
.popup-btn { flex: 1; padding: 6px; border-radius: 3px; font-size: 11px; font-weight: 600; font-family: 'Barlow', sans-serif; cursor: pointer; text-align: center; transition: all .12s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 4px; border: none; }
.popup-btn-maps { background: #4285F4; color: #fff; }
.popup-btn-maps:hover { background: #5a96f5; }
.popup-btn-waze { background: #33CCFF; color: #000; }
.popup-btn-waze:hover { background: #55D9FF; }

/* Leaflet dark overrides */
.leaflet-control-zoom a { background: #FFFFFF !important; color: #1A2035 !important; border-color: #DDE2EE !important; }
.leaflet-control-zoom a:hover { background: #EEF3FC !important; }
.leaflet-bar { border: 1px solid #DDE2EE !important; box-shadow: 0 2px 8px rgba(0,0,0,.08) !important; }
</style>
</head>

</div>

const CADENA_CLR = {OXXO:'#C9333A',TAMBO:'#D9742B',PRIMAX:'#2A5BA8',REPSOL:'#B89B1F',AVA:'#7B45B0',BODEGA:'#5A6070'};
const VISIT_MIN = {'DISPENSER MULTICATEGORIA':25,'DISPENSER MULTICATEGORIA | REELS':35,'DISPENSER MULTICATEGORIA | FACING Y NICHO':35,'REELS':20,'FACING Y NICHO':20};
const START = 8*60, TRAVEL = 8;
const PROY_SHORT = {'DISPENSER MULTICATEGORIA':'Dispenser','DISPENSER MULTICATEGORIA | REELS':'Disp + Reel','DISPENSER MULTICATEGORIA | FACING Y NICHO':'Disp + Facing','REELS':'Reel','FACING Y NICHO':'Facing'};

let curDay=1, curMerch='A', selIdx=null;
let map, markers=[], polyline=null;

function getPoints(){return DATA[String(curDay)][curMerch==='A'?'MERCADERISTA A':'MERCADERISTA B'];}
function calcTimes(pts){let m=START;return pts.map((p,i)=>{if(i>0)m+=TRAVEL;const s=m;const d=VISIT_MIN[p.proyecto]||25;m+=d;return{start:s,end:m,dur:d};});}
function fmt(m){const h=Math.floor(m/60),mm=m%60;return`${h}:${String(mm).padStart(2,'0')}`;}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── MAP INIT ──
map = L.map('map', {zoomControl:true, attributionControl:false}).setView([-12.1,-77.03],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
L.control.attribution({position:'bottomright'}).addAttribution('© CartoDB').addTo(map);

function renderMap(){
  const pts = getPoints();
  const times = calcTimes(pts);
  const mc = curMerch==='A'?'#3A7FD5':'#2E9E6B';

  // Clear
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  if(polyline) map.removeLayer(polyline);

  // Route line
  const latlngs = pts.map(p=>[p.lat,p.lon]);
  polyline = L.polyline(latlngs, {color:mc, weight:2.5, opacity:0.55, dashArray:'6,5'}).addTo(map);

  // Markers
  pts.forEach((p,i)=>{
    const col = CADENA_CLR[p.cadena]||'#888';
    const isSel = selIdx===i;
    const sz = isSel?30:22;
    const icon = L.divIcon({
      className:'',
      html:`<div class="bat-marker${isSel?' selected':''}" style="width:${sz}px;height:${sz}px;background:${col};font-size:${isSel?11:9}px;border-color:${isSel?'#C8A84B':'rgba(255,255,255,.4)'};border-width:${isSel?'2.5px':'2px'}">${p.orden}</div>`,
      iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
    });
    const m = L.marker([p.lat,p.lon],{icon}).addTo(map);

    // Popup
    const t = times[i];
    const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lon}&travelmode=driving`;
    const wazeUrl=`https://waze.com/ul?ll=${p.lat},${p.lon}&navigate=yes`;
    const otShort = (p.ot||'').replace('IMPLEMENTAR MATERIALES D. MULTICATEGORÍA + ','').replace('IMPLEMENTAR MATERIALES D. MULTICATEGORÍA','Dispenser multicategoría');
    const cigBlock = p.cigarrera?`<div class="popup-cig"><span class="popup-cig-icon">🚬</span><span class="popup-cig-text">Cigarrera: ${escHtml(p.cigarrera)}${p.cant_cig?' — cantidad: '+p.cant_cig:''}</span></div>`:'';
    m.bindPopup(`<div class="popup-inner">
      <div class="popup-header">
        <div class="popup-num" style="background:${col}">${p.orden}</div>
        <div class="popup-title-wrap">
          <div class="popup-title">${escHtml(p.pos)}</div>
          <div class="popup-cadena" style="color:${col}">${p.cadena}</div>
        </div>
      </div>
      <div class="popup-grid">
        <div class="popup-key">Distrito</div><div class="popup-val">${escHtml(p.distrito)}</div>
        <div class="popup-key">Dirección</div><div class="popup-val">${escHtml(p.direccion)}</div>
        <div class="popup-key">Hora</div><div class="popup-val">${fmt(t.start)} — ${fmt(t.end)} (${t.dur} min)</div>
        <div class="popup-key">Proyecto</div><div class="popup-val">${PROY_SHORT[p.proyecto]||p.proyecto}</div>
        <div class="popup-key">OT</div><div class="popup-val">${escHtml(otShort)}</div>
      </div>
      ${cigBlock}
      <div class="popup-actions">
        <a class="popup-btn popup-btn-maps" href="${mapsUrl}" target="_blank">📍 Google Maps</a>
        <a class="popup-btn popup-btn-waze" href="${wazeUrl}" target="_blank">🔵 Waze</a>
      </div>
    </div>`,{maxWidth:300,className:'bat-popup'});

    m.on('click',()=>{selIdx=(selIdx===i?null:i);renderMap();renderList();if(selIdx!==null)scrollToCard(selIdx);});
    markers.push(m);
  });

  // Fit bounds
  if(latlngs.length) map.fitBounds(L.latLngBounds(latlngs).pad(0.15));

  renderList();
  renderStats();
}

function renderList(){
  const pts=getPoints(); const times=calcTimes(pts);
  const mc=curMerch==='A'?'#3A7FD5':'#2E9E6B';
  const mLabel=curMerch==='A'?'Mercaderista A':'Mercaderista B';
  document.getElementById('sidebarTitle').textContent=`Día ${curDay} · ${mLabel} · ${pts.length} paradas`;
  document.getElementById('routeList').innerHTML=pts.map((p,i)=>{
    const t=times[i]; const col=CADENA_CLR[p.cadena]||'#888';
    const isSel=selIdx===i;
    const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lon}&travelmode=driving`;
    const otShort=(p.ot||'').replace('IMPLEMENTAR MATERIALES D. MULTICATEGORÍA + ','').replace('IMPLEMENTAR MATERIALES D. MULTICATEGORÍA','Dispenser');
    const cig=p.cigarrera?`<div class="stop-cig">🚬 ${escHtml(p.cigarrera)}${p.cant_cig?' ×'+p.cant_cig:''}</div>`:'';
    return`<div class="stop-card${isSel?' selected':''}" id="card-${i}" onclick="selectCard(${i})">
      <div class="stop-num-wrap">
        <div class="stop-num" style="background:${col}">${p.orden}</div>
        ${i<pts.length-1?`<div class="stop-connector" style="background:${mc}44"></div>`:''}
      </div>
      <div class="stop-body">
        <div class="stop-name">${escHtml(p.pos)}</div>
        <div class="stop-meta">
          <span class="stop-time">${fmt(t.start)}</span>
          <span class="stop-district">${escHtml(p.distrito)}</span>
          <span class="stop-dur">${t.dur}min</span>
        </div>
        <div class="stop-ot">${escHtml(PROY_SHORT[p.proyecto]||'')} — ${escHtml(otShort)}</div>
        ${cig}
        <a class="nav-link" href="${mapsUrl}" target="_blank">↗ Navegar</a>
      </div>
    </div>`;
  }).join('');
}

function renderStats(){
  const pts=getPoints(); const times=calcTimes(pts);
  const last=times[times.length-1];
  const disp=pts.filter(p=>p.proyecto.includes('DISPENSER')).length;
  const reel=pts.filter(p=>p.proyecto.includes('REELS')).length;
  const facing=pts.filter(p=>p.proyecto.includes('FACING')).length;
  const cadenas={};pts.forEach(p=>cadenas[p.cadena]=(cadenas[p.cadena]||0)+1);
  const cadenaStr=Object.entries(cadenas).map(([k,v])=>`<span class="stat-item"><span class="stat-val" style="color:${CADENA_CLR[k]||'#888'}">${v}</span><span class="stat-lbl">${k}</span></span>`).join('');
  document.getElementById('statsBar').innerHTML=
    `<span class="stat-item"><span class="stat-val">08:00</span><span class="stat-lbl">Inicio</span></span>`+
    `<span class="stat-sep"></span>`+
    `<span class="stat-item"><span class="stat-val">${fmt(last.end)}</span><span class="stat-lbl">Fin est.</span></span>`+
    `<span class="stat-sep"></span>`+
    `${cadenaStr}`+
    `<span class="stat-sep"></span>`+
    `<div class="project-tags">`+
    (disp?`<span class="ptag disp">Dispenser ${disp}</span>`:'')+
    (reel?`<span class="ptag reel">Reel ${reel}</span>`:'')+
    (facing?`<span class="ptag facing">Facing ${facing}</span>`:'')+
    `</div>`;
}

function selectCard(i){selIdx=(selIdx===i?null:i);renderMap();if(selIdx!==null){markers[selIdx].openPopup();}}
function scrollToCard(i){const el=document.getElementById('card-'+i);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});}

window.selectDay=(d,btn)=>{curDay=d;selIdx=null;document.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderMap();};
window.selectMerch=(m)=>{curMerch=m;selIdx=null;document.getElementById('btnA').className='merch-btn'+(m==='A'?' active-a':'');document.getElementById('btnB').className='merch-btn'+(m==='B'?' active-b':'');renderMap();};
window.openFullRoute=()=>{
  const pts=getPoints();if(!pts.length)return;
  const origin=`${pts[0].lat},${pts[0].lon}`;
  const dest=`${pts[pts.length-1].lat},${pts[pts.length-1].lon}`;
  const wps=pts.slice(1,-1).map(p=>`${p.lat},${p.lon}`).join('|');
  window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${wps}&travelmode=driving`,'_blank');
};

renderMap();
</script>
</body>
</html>
